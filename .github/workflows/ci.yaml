name: Demo Node.js CI Pipeline

# ---------------------------------------------------------
# Define the events that will trigger this workflow
# ---------------------------------------------------------
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

# ---------------------------------------------------------
# Define the jobs to be run
# ---------------------------------------------------------
jobs:
  build-and-test:
    # Specify the operating system environment for the runner
    runs-on: ubuntu-latest

    # ---------------------------------------------------------
    # Define the sequence of steps for this job
    # ---------------------------------------------------------
    steps:
      # Step 1: Check out the repository code onto the runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up the specific version of Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm' # Speeds up execution by caching npm dependencies

      # Step 3: Install dependencies
      - name: Install Dependencies
        run: npm ci

      # Step 4: Run a build script (if applicable)
      - name: Build Project
        run: npm run build